# Runs the open-source Google Maps scraper (gosom/google-maps-scraper) locally.
# Web/API mode on http://localhost:8080. The image has NO built-in auth, so we bind
# to 127.0.0.1 ONLY — that localhost binding is the security boundary. Do not change
# the port mapping to 0.0.0.0 / a public interface without putting an auth proxy in front.

services:
  google-maps-scraper:
    # Pinned to a known-good release for reproducibility (bump deliberately).
    # The published image is linux/amd64. On Apple Silicon (M1/M2/M3) it runs under
    # emulation; if it won't start, UNCOMMENT the 'platform' line below.
    image: gosom/google-maps-scraper:v1.15.0
    # platform: linux/amd64
    container_name: gmaps-scraper
    restart: unless-stopped
    command: ["-web", "-data-folder", "/gmapsdata"]
    ports:
      - "127.0.0.1:8080:8080"   # localhost only — see warning above
    volumes:
      - gmaps_data:/gmapsdata    # job results persist here
      - gmaps_cache:/opt         # Playwright browser cache (faster restarts)

volumes:
  gmaps_data:
  gmaps_cache:
